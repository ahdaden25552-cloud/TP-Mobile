<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>TP Mobile Clean Soft</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
    radial-gradient(circle at top left,#1f2937,#000),
    radial-gradient(circle at bottom right,#0f172a,#020617);
    overflow:hidden;
    position:relative;
}

/* Glow Background */
body::before{
    content:'';
    position:absolute;
    width:700px;
    height:700px;
    background:linear-gradient(135deg,#00c6ff,#0072ff);
    border-radius:50%;
    filter:blur(180px);
    opacity:0.35;
    top:-200px;
    left:-200px;
}

body::after{
    content:'';
    position:absolute;
    width:600px;
    height:600px;
    background:linear-gradient(135deg,#8b5cf6,#06b6d4);
    border-radius:50%;
    filter:blur(180px);
    opacity:0.25;
    bottom:-200px;
    right:-200px;
}

.container{
    position:relative;
    z-index:10;
    width:90%;
    max-width:850px;
    padding:50px;
    border-radius:32px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,0.12);
    box-shadow:
    0 0 40px rgba(0,0,0,0.5),
    inset 0 0 20px rgba(255,255,255,0.05);
    text-align:center;
}

.logo{
    font-size:55px;
    margin-bottom:15px;
}

h1{
    color:white;
    font-size:42px;
    font-weight:700;
    letter-spacing:1px;
}

.desc{
    margin-top:12px;
    color:#cbd5e1;
    font-size:18px;
    line-height:1.7;
}

.link-box{
    margin-top:35px;
    padding:20px;
    border-radius:20px;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.08);
    overflow:hidden;
}

.link{
    color:#38bdf8;
    font-size:15px;
    word-break:break-all;
    line-height:1.8;
}

.buttons{
    margin-top:30px;
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
}

button,
a.download{
    padding:16px 34px;
    border:none;
    border-radius:18px;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
    text-decoration:none;
    color:white;
    position:relative;
    overflow:hidden;
}

.copy-btn{
    background:linear-gradient(135deg,#06b6d4,#3b82f6);
    box-shadow:0 10px 25px rgba(59,130,246,0.35);
}

.download{
    background:linear-gradient(135deg,#8b5cf6,#6366f1);
    box-shadow:0 10px 25px rgba(139,92,246,0.35);
}

button:hover,
a.download:hover{
    transform:translateY(-4px) scale(1.03);
    opacity:0.95;
}

.footer{
    margin-top:35px;
    color:#94a3b8;
    font-size:14px;
    letter-spacing:1px;
}

/* Responsive */
@media(max-width:768px){

    .container{
        padding:35px 25px;
    }

    h1{
        font-size:32px;
    }

    .desc{
        font-size:15px;
    }

    .logo{
        font-size:45px;
    }
}
</style>
</head>
<body>

<div class="container">

    <div class="logo"></div>

    <h1>TP Mobile Clean Soft</h1>

    <p class="desc">
        Premium Apple Technology Services <br>
        Modern Interface • Ultra Sharp 4K Display
    </p>

    <div class="link-box">
        <div class="link" id="configLink">
https://raw.githubusercontent.com/PhucAnhIT/ALL-IN-ONE/refs/heads/main/ALL_IN_ONE.sgmodule?v123
        </div>
    </div>

    <div class="buttons">

        <button class="copy-btn" onclick="copyLink()">
            COPY LINK
        </button>

        <a class="download"
        href="https://raw.githubusercontent.com/PhucAnhIT/ALL-IN-ONE/refs/heads/main/ALL_IN_ONE.sgmodule?v123">
            OPEN LINK
        </a>

    </div>

    <div class="footer">
        © TP Mobile Clean Soft • All Rights Reserved
    </div>

</div>

<script>
function copyLink() {

    const text =
`https://raw.githubusercontent.com/PhucAnhIT/ALL-IN-ONE/refs/heads/main/ALL_IN_ONE.sgmodule?v123`;

    navigator.clipboard.writeText(text);

    alert("Đã copy link thành công!");
}
</script>

</body>
</html>
